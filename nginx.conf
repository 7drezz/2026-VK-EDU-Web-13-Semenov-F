worker_processes 1;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    access_log /tmp/nginx_access.log;
    error_log /tmp/nginx_error.log;
    
    server {
        listen 8080;
        server_name localhost;
        
        location /static/ {
            alias /tmp/static/;
        }
        
        location / {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }
    }
}
