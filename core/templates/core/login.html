{% extends 'core/base.html' %}
{% load static %}

{% block title %}Log in{% endblock %}

{% block content %}
<h3 class="mb-4">Log in</h3>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="alert alert-danger" role="alert">
            Sorry, wrong login or password!
        </div>

        <form>
            <div class="mb-3">
                <label for="login" class="form-label fw-semibold">Login</label>
                <input type="text" class="form-control" id="login" placeholder="Enter your login">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-success">Log in</button>
        </form>

        <div class="mt-3">
            <a href="{% url 'core:signup' %}" class="text-decoration-none">Create new account</a>
        </div>
    </div>
</div>
{% endblock %}
