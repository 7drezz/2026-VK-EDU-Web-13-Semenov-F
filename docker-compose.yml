services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: askpupkin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    networks:
      - app_network

  centrifugo:
    image: centrifugo/centrifugo:v5
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8003:8003"
    volumes:
      - ./centrifugo:/centrifugo
    networks:
      - app_network

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - app_network

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      - db
      - redis
      - centrifugo
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: askpupkin
      DB_USER: postgres
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      CENTRIFUGO_API_URL: http://centrifugo:8003/api
      CENTRIFUGO_API_KEY: centrifugo-api-key
      CENTRIFUGO_TOKEN_SECRET: centrifugo-token-secret
      CENTRIFUGO_WS_URL: ws://localhost:8003/connection/websocket
    networks:
      - app_network

  celery:
    build: .
    command: celery -A application worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: askpupkin
      DB_USER: postgres
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      CENTRIFUGO_API_URL: http://centrifugo:8003/api
      CENTRIFUGO_API_KEY: centrifugo-api-key
      CENTRIFUGO_TOKEN_SECRET: centrifugo-token-secret
    networks:
      - app_network

  celerybeat:
    build: .
    command: celery -A application beat --scheduler redbeat.RedBeatScheduler --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: askpupkin
      DB_USER: postgres
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      CENTRIFUGO_API_URL: http://centrifugo:8003/api
      CENTRIFUGO_API_KEY: centrifugo-api-key
      CENTRIFUGO_TOKEN_SECRET: centrifugo-token-secret
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network: